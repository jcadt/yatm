# dominio usado por la interfaz de usuario
domain: http://127.0.0.1:8080
# enlace del servicio HTTP
listen: 127.0.0.1:8080
# puerto de depuración
debug_listen: 127.0.0.1:8081

# configuración de la base de datos, puedes usar sqlite o mysql (sin probar)
database:
  dialect: sqlite
  dsn: ./tapes.db

# unidades de cinta disponibles, deben tener mapeo sg.
# usa el comando `sg_map` (del paquete sg3_utils) para obtener el dispositivo sg correspondiente.
tape_devices:
  - /dev/tape/by-id/scsi-HUJ0000000

# capacidad de cinta en bytes (opcional). Si se define, YATM estima si los sources caben
# en una sola cinta y avisa antes de empezar el job.
# Ejemplo: 2.5TB = 2500000000000
# tape_capacity: 2500000000000

# configuración de rutas de trabajo
paths:
  # para guardar logs y escribir informes
  work: ./
  # directorio origen en el creador de backups
  source: ./
  # directorio destino para restauración
  target: ./

# estos scripts interactúan con software externo, puede que necesites cambiarlos para tu caso.
# backup_db no se referencia desde el código; se ejecuta como cron job independiente.
#   daily: cd <yatm_dir> && ./scripts/backup-db
# discover-devices: si tape_devices está vacío, el executor lo ejecuta automáticamente en arranque.
scripts:
  # activa el cifrado hardware en la unidad de cinta
  encrypt: ./scripts/encrypt
  # formatea LTFS en cinta LTO, puede necesitar cambios según el software LTFS.
  mkfs: ./scripts/mkfs
  # monta LTFS en la ruta especificada, puede necesitar cambios según el software LTFS.
  mount: ./scripts/mount
  # desmonta ruta LTFS
  umount: ./scripts/umount
  # lee el barcode de la cinta para trabajos de restauración
  read_info: ./scripts/readinfo
